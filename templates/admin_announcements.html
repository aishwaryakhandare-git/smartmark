<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Notices - Admin</title>

<style>
body {
    background: #F4F7F9;
    font-family: 'Lexend', sans-serif;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1100px;
    margin: auto;
}

h1 {
    font-size: 32px;
    font-weight: 900;
    margin-bottom: 10px;
}

.subtitle {
    color: #777;
    margin-bottom: 20px;
}

.notice-card {
    background: white;
    padding: 20px;
    border: 1px solid #e7edf3;
    border-radius: 12px;
    margin-bottom: 18px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.notice-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.notice-header h2 {
    font-size: 20px;
    margin: 0;
}

.notice-body {
    margin-top: 10px;
    color: #444;
}

.date {
    font-size: 13px;
    color: #666;
}

.delete-btn {
    background: #ff4d4d;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
}

.delete-btn:hover {
    background: #d93636;
}

.back-btn {
    display: inline-block;
    margin-top: 25px;
    padding: 10px 18px;
    background: #222;
    color: white;
    text-decoration: none;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

    <h1>All Notices</h1>
    <p class="subtitle">View all announcements posted by admin.</p>

    {% if notices %}
        {% for n in notices %}
        <div class="notice-card">

            <div class="notice-header">
                <h2>{{ n.title }}</h2>
                <form method="POST" action="{{ url_for('delete_admin_notice') }}" onsubmit="return confirm('Delete this notice?');">
                    <input type="hidden" name="notice_id" value="{{ n.id }}">
                    <button class="delete-btn">Delete</button>
                </form>
            </div>

            <div class="date">{{ n.timestamp }} | Audience: {{ n.audience|capitalize }}</div>

            <div class="notice-body">
                {{ n.body }}
            </div>

        </div>
        {% endfor %}
    {% else %}
        <p>No notices available.</p>
    {% endif %}

    <a href="{{ url_for('upload_notice') }}" class="back-btn">⬅ Back</a>

</div>

</body>
</html>
