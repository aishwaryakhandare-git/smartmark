<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: #fff;
    }
    .login-box {
      background: rgba(0,0,0,0.5);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      min-width: 300px;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      font-size: 1rem;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #ff4b5c;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    .error { 
      color: #ffb3b3; 
      margin: 10px 0; 
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Teacher Login</h2>
  <form method="POST" action="{{ url_for('teacher_login') }}">
    <input type="text" name="teacher_name" placeholder="Enter Name" required><br>
    <input type="password" name="subject_password" placeholder="Enter Subject Password" required><br>
    <button type="submit">Login</button>
  </form>

  <!-- Display flash messages inside pop-up -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="error">
        {% for category, message in messages %}
          {{ message }}<br>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
</div>

</body>
</html>
