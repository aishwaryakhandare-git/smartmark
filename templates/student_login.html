<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login - SmartMark</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
  }

  /* Modal backdrop */
  .modal-backdrop {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    display: flex; justify-content: center; align-items: center;
  }

  /* Modal box */
  .modal-box {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  .modal-box h2 { margin-bottom: 20px; }
  .modal-box input {
    width: 90%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
    font-size: 1rem;
  }
  .modal-box button {
    padding: 10px 25px;
    border: none;
    border-radius: 8px;
    background: #4CAF50;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s;
  }
  .modal-box button:hover {
    background: #45a049;
  }

  .flash-message {
    margin-bottom: 15px;
    color: #ff4b5c;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="modal-backdrop">
  <div class="modal-box">
    <h2>Student Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash-message">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('student_login') }}">
      <input type="text" name="student_id" placeholder="Enter Roll No" required>
      <input type="password" name="password" placeholder="Enter Password" required>
      <br>
      <button type="submit">Login</button>
    </form>
  </div>
</div>

</body>
</html>
